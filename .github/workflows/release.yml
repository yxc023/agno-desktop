# Release: tag push 触发，跨平台 build + sign + publish
#
# 触发方式：git tag v0.0.X && git push --tags
#   → 自动在 draft release 里产出所有平台的 dmg/msi + latest.json
#   → 你去 GitHub Release 页面审核 → "Publish release"
#
# 矩阵：
#   - macOS aarch64 (Apple Silicon, dmg)
#   - Windows x86_64 (MSI)
# Linux 暂不打包（先聚焦 macOS / Windows）
#
# Secrets 必须在 Settings → Secrets → Actions 配齐：
#   - TAURI_SIGNING_PRIVATE_KEY         (cat ~/.tauri/keys/agno-desktop.key 输出)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD (cat ~/.tauri/keys/agno-desktop.key.password)
#
# 预估耗时：15-25 分钟（macOS runner 排队 + 三平台 build）。

name: Release

on:
  push:
    tags:
      - "v*"
  # 手动触发：Actions → Release → Run workflow → 输入版本号（用于 dry-run / 重新触发）
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag like v0.0.4 (only used when triggered manually without a tag push)"
        required: false
        default: ""

# tag push 时只跑一次；手动触发也只跑一次
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # 创建 / 上传 release assets 必需

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false       # 一个平台失败不影响其它平台资产上传
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
            args: "--target aarch64-apple-darwin"
            artifact_glob: |
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
              target/aarch64-apple-darwin/release/bundle/macos/*.app
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (MSI)
            args: ""
            artifact_glob: |
              target/release/bundle/msi/*.msi
              target/release/bundle/msi/*.msi.sig

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # 给 Tauri Action 提供：rustup target add（如需）
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build & sign Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS codesign/notarize intentionally skipped:
          # - tauri.conf.json → bundle.macOS.signingIdentity = null disables it
          # - no Apple Developer account / certificates available
          # To enable later, remove the null in conf + add these secrets:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Agno Desktop ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            ${{ github.event.head_commit.message }}

            Full changelog: see [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).

            ## Downloads

            See **Assets** below. Pick the file matching your OS:

            | File | OS |
            |------|-----|
            | `*.dmg` | macOS Apple Silicon (M1/M2/M3/M4) |
            | `*.msi` | Windows x86_64 |

            > macOS dmg is **not** Apple code-signed / notarized.
            > First launch requires right-click → Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true     # ← 关键：自动生成 latest.json
          updaterJsonPreferNsis: false  # 用 RSA signature，不用 nsis
          args: ${{ matrix.args }}

      # tauri-action 已经把 artifacts 上传到 release 了；下面这步只保留 draft + 一份 cache 给后续 verify
      - name: Summary
        if: success()
        run: |
          echo "✅ Build done for ${{ matrix.label }}"
          echo "Tag: ${{ github.ref_name }}"
          echo "Draft release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  verify:
    name: Verify latest.json matches this release
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Wait for GitHub release assets to settle
        run: sleep 30

      # 用 GitHub API + gh CLI 抓本 release 的 latest.json asset。
      # 不能用 `releases/latest/download/latest.json` ——draft 状态下它会
      # 重定向到上一个 published release（v0.0.4），那个 stale 的 latest.json
      # 也恰好写着 "version": "0.0.5"，但 URL 全指向 v0.0.4 artifacts，
      # 是个 false-positive 陷阱。
      #
      # 也不能用 `repos/.../releases/tags/{tag}` ——draft release 在这个端点
      # 上返回 404（GitHub API quirk）。改用 list-all 端点 + jq 过滤：
      #
      #   gh api repos/.../releases | jq '.[] | select(.tag_name == TAG) | .id'
      #
      # 这个端点对 draft + published 都返回数据。
      - name: Fetch latest.json via API (tag-scoped, draft-safe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # 列出 repo 所有 release（draft + published），过滤到本 tag 的
          RELEASE_ID=$(gh api "repos/${REPO}/releases" \
            --paginate --jq '.[] | select(.tag_name == "'"${TAG}"'") | .id' \
            | head -1)

          if [ -z "${RELEASE_ID}" ]; then
            echo "::error::release ${TAG} not found in repo ${REPO}"
            echo "::error::build job 应该会用 tauri-action 创建一个 draft release，"
            echo "::error::如果缺了说明 build job 没跑通或 tag 还没推上去。"
            exit 1
          fi
          echo "release ${TAG} id=${RELEASE_ID}"

          # 抓 latest.json 的 asset id
          ASSET_ID=$(gh api "repos/${REPO}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name == "latest.json") | .id')

          if [ -z "${ASSET_ID}" ]; then
            echo "::error::latest.json not found in release ${TAG}"
            echo "::error::tauri-action 应该会上传 latest.json 作为 asset，"
            echo "::error::如果缺了说明 build job 没跑通或 tauri.conf.json 没配 pubkey。"
            exit 1
          fi
          echo "latest.json asset_id=${ASSET_ID} on ${TAG}"

          # API download：Accept header 让 GitHub 返回 raw bytes 而不是 JSON 包装
          # 注意：CI runner 上的 gh 版本可能较老，不支持 --output 标志，用 shell
          # redirect > latest.json 替代。
          gh api "repos/${REPO}/releases/assets/${ASSET_ID}" \
            -H "Accept: application/octet-stream" \
            > latest.json

          echo "--- latest.json ---"
          cat latest.json
          echo
          echo "---"

      - name: Validate latest.json shape + URLs point to THIS tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys

          with open('latest.json') as f:
              d = json.load(f)

          tag = os.environ['TAG']                       # e.g. "v0.0.5"
          expected_version = tag.lstrip('v')            # e.g. "0.0.5"

          # 1. Top-level shape
          if 'version' not in d:
              sys.exit('missing version field')
          if 'platforms' not in d or not d['platforms']:
              sys.exit('no platforms')

          # 2. version 必须等于 tag（剥掉 v 前缀）
          #    之前 v0.0.4 release 上的 stale latest.json 写着 "version": "0.0.5"
          #    但 URL 指向 v0.0.4 —— 这个断言就是为了在 build 阶段就拦下来。
          if d['version'] != expected_version:
              sys.exit(
                  f'version mismatch: latest.json says {d["version"]!r}, '
                  f'expected {expected_version!r} (derived from tag {tag!r})'
              )

          # 3. 每个 platform 必须有 url + signature，且 url 必须指向本 release
          #    （这是这次 verify job 升级的核心——之前只看 "url 不为空"）
          bad_urls = []
          for plat, info in d['platforms'].items():
              if not info.get('signature'):
                  sys.exit(f'{plat} missing signature')
              if not info.get('url'):
                  sys.exit(f'{plat} missing url')
              url = info['url']
              expected_substr = f'/releases/download/{tag}/'
              if expected_substr not in url:
                  bad_urls.append((plat, url))

          if bad_urls:
              print('::error::URLs point to wrong release (stale latest.json):')
              for plat, url in bad_urls:
                  print(f'::error::  {plat}: {url}')
              sys.exit(
                  f'{len(bad_urls)} platform(s) have URLs pointing to a different '
                  f'release than {tag}. latest.json 上传错了或者 build 阶段没拿到 '
                  f'正确的 artifacts。'
              )

          # 4. 必须包含所有 built 平台（matrix include 里列的那些）
          expected_platforms = {
              'darwin-aarch64',
              'darwin-aarch64-app',
              'windows-x86_64',
              'windows-x86_64-msi',
              'windows-x86_64-nsis',
          }
          actual = set(d['platforms'].keys())
          missing = expected_platforms - actual
          extra = actual - expected_platforms
          if missing:
              print(f'::warning::missing expected platforms: {sorted(missing)}')
              # 不 fail：tauri-action 的 platform key 可能因版本变化
              if len(missing) > 2:
                  sys.exit(f'too many missing platforms ({len(missing)})')

          print(f'✓ version matches tag ({d["version"]})')
          print(f'✓ platforms present: {sorted(actual)}')
          if extra:
              print(f'  (extra platforms not in matrix: {sorted(extra)} — OK)')
          print(f'✓ all {len(actual)} URLs point to {tag}')
          print(f'✓ all {len(actual)} platforms have signature')
          PYEOF

      - name: Summary
        if: success()
        run: |
          echo "✅ latest.json for ${{ github.ref_name }} is valid and points to THIS release"
          echo "Reviewer: visit https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "Then click 'Publish release' to make it visible to updaters."

      - name: Failure summary
        if: failure()
        run: |
          echo "❌ latest.json validation failed"
          echo "Things to check:"
          echo "  1. tauri.conf.json plugins.updater.pubkey 配对 CI 的 TAURI_SIGNING_PRIVATE_KEY"
          echo "  2. build job 跑成功了（artifact_glob 匹配到了 dmg/msi/tar.gz）"
          echo "  3. tauri-action includeUpdaterJson: true（应该默认就会生成 latest.json asset）"
          echo "  4. 上面的 stderr 输出，看看是 version 不匹配还是 URL 指向错 release"