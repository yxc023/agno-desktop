# Release: tag push 触发，跨平台 build + sign + publish
#
# 触发方式：git tag v0.0.X && git push --tags
#   → 自动在 draft release 里产出所有平台的 dmg/msi/AppImage + latest.json
#   → 你去 GitHub Release 页面审核 → "Publish release"
#
# 矩阵决策（与用户确认）：
#   - D1: ✅ 配 CI（见 ci.yml）
#   - D2: macOS 只出 aarch64（Apple Silicon）
#   - D3: ❌ 不做 Apple code-sign / notarize（首次启动需右键 → 打开）
#   - D4: Linux 只出 AppImage
#   - D5: release notes 模板 + GitHub 自动生成 commit log
#
# Secrets 必须在 Settings → Secrets → Actions 配齐：
#   - TAURI_SIGNING_PRIVATE_KEY         (cat ~/.tauri/keys/agno-desktop.key 输出)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD (cat ~/.tauri/keys/agno-desktop.key.password)
#
# 预估耗时：15-25 分钟（macOS runner 排队 + 三平台 build）。

name: Release

on:
  push:
    tags:
      - "v*"
  # 手动触发：Actions → Release → Run workflow → 输入版本号（用于 dry-run / 重新触发）
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag like v0.0.4 (only used when triggered manually without a tag push)"
        required: false
        default: ""

# tag push 时只跑一次；手动触发也只跑一次
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # 创建 / 上传 release assets 必需

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false       # 一个平台失败不影响其它平台资产上传
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
            args: "--target aarch64-apple-darwin"
            artifact_glob: |
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
              target/aarch64-apple-darwin/release/bundle/macos/*.app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux (AppImage)
            args: ""
            artifact_glob: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/appimage/*.AppImage.sig
              target/release/bundle/deb/*.deb
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (MSI)
            args: ""
            artifact_glob: |
              target/release/bundle/msi/*.msi
              target/release/bundle/msi/*.msi.sig

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # 给 Tauri Action 提供：rustup target add（如需）、Linux 系统依赖（webkit2gtk 等）
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build & sign Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS codesign/notarize intentionally skipped:
          # - tauri.conf.json → bundle.macOS.signingIdentity = null disables it
          # - no Apple Developer account / certificates available
          # To enable later, remove the null in conf + add these secrets:
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Agno Desktop ${{ github.ref_name }}"
          releaseBody: |
            ## What's Changed

            ${{ github.event.head_commit.message }}

            Full changelog: see [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).

            ## Downloads

            See **Assets** below. Pick the file matching your OS:

            | File | OS |
            |------|-----|
            | `*.dmg` | macOS Apple Silicon (M1/M2/M3/M4) |
            | `*.AppImage` | Linux x86_64 |
            | `*.msi` | Windows x86_64 |

            > macOS dmg is **not** Apple code-signed / notarized.
            > First launch requires right-click → Open to bypass Gatekeeper.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true     # ← 关键：自动生成 latest.json
          updaterJsonPreferNsis: false  # 用 RSA signature，不用 nsis
          args: ${{ matrix.args }}

      # tauri-action 已经把 artifacts 上传到 release 了；下面这步只保留 draft + 一份 cache 给后续 verify
      - name: Summary
        if: success()
        run: |
          echo "✅ Build done for ${{ matrix.label }}"
          echo "Tag: ${{ github.ref_name }}"
          echo "Draft release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

  verify:
    name: Verify latest.json is reachable
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Wait for GitHub release assets to settle
        run: sleep 30

      - name: Fetch latest.json
        id: latest
        run: |
          URL="https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
          echo "url=$URL"
          curl -sLf "$URL" -o latest.json || {
            echo "::error::latest.json not reachable yet — release may not have been finalized"
            exit 1
          }
          cat latest.json
          python3 -c "
          import json
          d = json.load(open('latest.json'))
          assert 'version' in d, 'missing version'
          assert 'platforms' in d and d['platforms'], 'no platforms'
          print('OK, version:', d['version'])
          print('platforms:', list(d['platforms'].keys()))
          for plat, info in d['platforms'].items():
            assert info.get('signature'), f'{plat} missing signature'
            assert info.get('url'), f'{plat} missing url'
          print('all platforms have url + signature ✓')
          "

      - name: Summary
        if: success()
        run: |
          echo "✅ latest.json is published and valid"
          echo "Reviewer: visit https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo "Then click 'Publish release' to make it visible to updaters."